<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        .header {
            background: #2563eb;
            color: white;
            padding: 18px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            background: white;
            color: #2563eb;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 30px;
            background: white;
            border-radius: 8px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 25px;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        .image-preview {
            margin-top: 15px;
            max-width: 300px;
            display: none;
            border-radius: 5px;
        }

        .submit-container {
            text-align: center;
            margin-top: 30px;
        }

        .submit-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .submit-btn:hover {
            background: #1d4ed8;
        }

        .success {
            color: green;
            margin-top: 15px;
        }

        .error {
            color: red;
            margin-top: 15px;
        }

        @media(max-width:768px) {
            .form-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>Create New Event</h2>

        <a href="/events" class="back-btn">
            ← Back to events
        </a>
    </div>

    <div class="container">

        <h1>Event Information</h1>

        <form id="eventForm">

            <div class="form-row">

                <div class="form-group">
                    <label>Event Name</label>
                    <input
                        type="text"
                        id="name"
                        required>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="category">
                        <option>Electronics</option>
                        <option>Software</option>
                        <option>Services</option>
                        <option>Subscription</option>
                    </select>
                </div>

            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>Status</label>
                    <select id="status">
                        <option>Active</option>
                        <option>Inactive</option>
                        <option>Draft</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Contact Name</label>
                    <input
                        type="text"
                        id="contactName">
                </div>

            </div>

            <div class="form-row">

                <div class="form-group">
                    <label>Contact Email</label>
                    <input
                        type="email"
                        id="contactEmail">
                </div>

                <div class="form-group">
                    <label>Contact Phone</label>
                    <input
                        type="text"
                        id="contactPhone">
                </div>

            </div>

            <div class="form-group">
                <label>Description</label>

                <textarea
                    id="description"
                    placeholder="Enter event description...">
                </textarea>
            </div>

            <br>

            <div class="form-group">
                <label>Event Image</label>

                <input
                    type="file"
                    id="image"
                    accept="image/*">

                <img
                    id="preview"
                    class="image-preview">
            </div>

            <div class="submit-container">

                <button
                    type="submit"
                    class="submit-btn">
                    Save Event
                </button>

                <div id="message"></div>

            </div>

        </form>

    </div>

    <script>

        const imageInput = document.getElementById('image');
        const preview = document.getElementById('preview');

        imageInput.addEventListener('change', function() {

            const file = this.files[0];

            if(file) {

                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
            }
        });

        document.getElementById('eventForm')
            .addEventListener('submit', async function(e) {

            e.preventDefault();

            const formData = new FormData();

            formData.append(
                'name',
                document.getElementById('name').value);

            formData.append(
                'category',
                document.getElementById('category').value);

            formData.append(
                'status',
                document.getElementById('status').value);

            formData.append(
                'contact_name',
                document.getElementById('contactName').value);

            formData.append(
                'contact_email',
                document.getElementById('contactEmail').value);

            formData.append(
                'contact_phone',
                document.getElementById('contactPhone').value);

            formData.append(
                'description',
                document.getElementById('description').value);

            if(imageInput.files[0]) {

                formData.append(
                    'image',
                    imageInput.files[0]);
            }

            try {

                const response = await fetch(
                    '/api/events/',
                    {
                        method: 'POST',
                        body: formData
                    });

                if(response.ok) {

                    document.getElementById('message')
                        .innerHTML =
                        '<div class="success">Event saved successfully.</div>';

                    document.getElementById('eventForm').reset();

                    preview.style.display = 'none';

                } else {

                    document.getElementById('message')
                        .innerHTML =
                        '<div class="error">Failed to save event.</div>';
                }

            } catch(error) {

                document.getElementById('message')
                    .innerHTML =
                    '<div class="error">API error occurred.</div>';
            }
        });

    </script>

</body>
</html>
