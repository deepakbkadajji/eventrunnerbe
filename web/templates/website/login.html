<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 400px;
            background: white;
            padding: 35px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.15);
        }

        .logo {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo h1 {
            color: #2563eb;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        .login-btn {
            width: 100%;
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        .login-btn:hover {
            background: #1d4ed8;
        }

        .error-message {
            color: red;
            margin-top: 15px;
            text-align: center;
        }

        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }

        .forgot-password a {
            text-decoration: none;
            color: #2563eb;
        }

    </style>
</head>
<body>

<div class="login-container">

    <div class="logo">
        <h1>Start 2 Finish Portal</h1>
        <p>Sign in to continue</p>
    </div>

    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}

        <div class="form-group">
            <label>Username or Email</label>
            <input
                type="text"
                name="username"
                autocomplete="username"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                autocomplete="current-password"
                required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

    </form>

    <div class="forgot-password">
        <a href="#">Forgot Password?</a>
    </div>

</div>

</body>
</html>
