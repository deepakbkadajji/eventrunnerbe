<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Website{% endblock %}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        nav {
            background: #2563eb;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/about/">About</a>
    <a href="/api/">API</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    © 2026 My Website
</footer>

</body>
</html>
