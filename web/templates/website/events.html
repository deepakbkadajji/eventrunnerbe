{% extends 'website/basepage.html' %}

{% block title %}
Participants
{% endblock %}

{% block content %}

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        height: 100vh;
    }

    /* Top Header */
    .header {
        height: 60px;
        background: #2563eb;
        color: white;
        display: flex;
        align-items: center;
        padding: 0 25px;
        font-size: 24px;
        font-weight: bold;
    }

    /* Main Layout */
    .container {
        display: flex;
        height: calc(100vh - 60px);
    }

    /* Left Navigation */
    .sidebar {
        width: 250px;
        background: #f4f4f4;
        border-right: 1px solid #ddd;
        padding-top: 20px;
    }

    .sidebar h3 {
        padding: 0 20px 15px;
        color: #333;
    }

    .sidebar a {
        display: block;
        padding: 12px 20px;
        text-decoration: none;
        color: #444;
        transition: background 0.3s;
    }

    .sidebar a:hover {
        background: #e5e7eb;
    }

    .sidebar a.active {
        background: #2563eb;
        color: white;
    }

    /* Content Area */
    .content {
        flex: 1;
        padding: 30px;
        background: #fafafa;
        overflow-y: auto;
    }

    .event-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 20px;
    }

    .card-container {
        display: grid;

        /* Creates as many columns as will fit */
        grid-template-columns: repeat(
            auto-fill,
            minmax(300px, 1fr)
        );

        gap: 20px;

        padding: 20px;
    }

    .event-card {
        background: white;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .event-card h4 {
        margin-bottom: 10px;
    }

    .event-card p {
        color: #666;
        margin-bottom: 15px;
    }

    .event-card button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
    }

    .event-card button:hover {
        background: #1d4ed8;
    }

    .event-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 6px;
        margin-bottom: 10px;
    }   

    @media(max-width:768px) {
        .container {
            flex-direction: column;
        }

        .sidebar {
            width: 100%;
            border-right: none;
            border-bottom: 1px solid #ddd;
        }
    }
</style>
<style>
    .add-event-btn {
        background: #16a34a;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }

    .add-event-btn:hover {
        background: #15803d;
    }
</style>
<style>
    .event-detail-btn {
        background: #16a34a;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }

    .event-detail-btn:hover {
        background: #15803d;
    }
</style>

<div style="margin-bottom:20px;">
    <a href="new-event">
    <button class="add-event-btn">
        + New Event
    </button>
</a>
</div>

<div class="container">

    <!-- Left Navigation -->
    <aside class="sidebar">
        <h3>Events</h3>

        <a href="#" class="active">All Events</a>
        <a href="#">Upcoming</a>
        <a href="#">Past</a>
        <a href="#">Categories</a>
        <a href="#">Subscriptions</a>
        <a href="index.html">← Back to Home</a>
    </aside>

    <!-- Content -->
    <main class="content">
        <h1>Events</h1>
        <br>

        <div class="card-container" id="eventCards">                
                <!--
                    <a href="event-details">
                        <button 
                            class="event-detail-btn"
                            onclick="openEvent(${event.id})">
                            View Details
                        </button>
                    </a>
                -->

        </div>
    </main>

</div>

<script>

document.addEventListener(
    'DOMContentLoaded',
    loadEvents
);

async function loadEvents() {

    try {

        const response = await fetch(
            '/api/events/',
            {
                credentials: 'same-origin'
            }
        );

        const events =
            await response.json();

        const container =
            document.getElementById(
                'eventCards'
            );

        container.innerHTML = '';

        events.forEach(
            event => {

                const card =
                    document.createElement('div');

                card.className =
                    'event-card';

                card.innerHTML = `

                    <img
                        src="${event.eventimage.eventMainImg}"
                        alt="${event.eventname}"
                        class="event-image">

                    <h3>
                        ${event.eventname}
                    </h3>



                    <p>
                        <strong>Start date:</strong>
                        ${event.eventdate} - ${event.eventenddate} 
                    </p>

                    <p>
                        <strong>Status:</strong>
                        ${event.eventstatus}
                    </p>

                    <p>
                        <strong>Type:</strong>
                        ${event.eventtype}
                    </p>

                    <p>
                        <strong>Contact:</strong>
                        ${event.contactpersonname} (${event.contactpersonemailaddr})
                    </p>                    

                    <button 
                        class="event-detail-btn"
                        onclick="openEvent(${event.id})">
                        View Details
                    </button>
                `;

                container.appendChild(card);
            }
        );

    }
    catch(error) {

        console.error(error);
    }
}

function openEvent(id) {

    window.location.href =
        `/events/${id}/`;
}

</script>


{% endblock %}
