    <table class="participant-table">

        <thead>
            <tr>
                <th></th>
                <th>User</th>
                <th>Title</th>
                <th>Surname</th>
                <th>First Name</th>
                <th>Initials</th>
                <th>Email Address</th>
            </tr>
        </thead>

        <tbody id="participantTableBody">

        </tbody>

    </table>

</div>

<script>

function openParticipant() {

    const selected =
        document.querySelector(
            'input[name="participant"]:checked'
        );

    if (!selected) {

        alert(
            'Please select a participant.'
        );

        return;
    }

    const participantId =
        selected.value;

    window.location.href =
        '/participants/' +
        participantId +
        '/';
}

document.addEventListener(
    'DOMContentLoaded',
    loadParticipants
);

async function loadParticipants() {

    try {

        const response = await fetch(
            '/api/participants/',
            {
                credentials: 'same-origin'
            }
        );

        const participants =
            await response.json();

        const tbody =
            document.getElementById(
                'participantTableBody'
            );

        tbody.innerHTML = '';

        participants.forEach(
            participant => {

                const row =
                    document.createElement('tr');

                row.innerHTML = `
                    <td>
                        <input
                            type="radio"
                            name="participant"
                            value="${participant.id}">
                    </td>

                    <td>${participant.user}</td>
                    <td>${participant.title}</td>
                    <td>${participant.surname}</td>
                    <td>${participant.firstname}</td>
                    <td>${participant.initials}</td>
                    <td>${participant.emailaddress}</td>
                `;

                tbody.appendChild(row);
            }
        );

    }
    catch(error) {

        console.error(
            'Failed to load participants',
            error
        );
    }
}

</script>
