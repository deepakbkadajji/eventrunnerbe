<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
        }

        /* Top Header */
        .header {
            height: 60px;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 25px;
            font-size: 24px;
            font-weight: bold;
        }

        /* Main Layout */
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* Left Navigation */
        .sidebar {
            width: 250px;
            background: #f4f4f4;
            border-right: 1px solid #ddd;
            padding-top: 20px;
        }

        .sidebar h3 {
            padding: 0 20px 15px;
            color: #333;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            text-decoration: none;
            color: #444;
            transition: background 0.3s;
        }

        .sidebar a:hover {
            background: #e5e7eb;
        }

        .sidebar a.active {
            background: #2563eb;
            color: white;
        }

        /* Content Area */
        .content {
            flex: 1;
            padding: 30px;
            background: #fafafa;
            overflow-y: auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .product-card h4 {
            margin-bottom: 10px;
        }

        .product-card p {
            color: #666;
            margin-bottom: 15px;
        }

        .product-card button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        .product-card button:hover {
            background: #1d4ed8;
        }

        @media(max-width:768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid #ddd;
            }
        }
    </style>
    <style>
    .add-event-btn {
        background: #16a34a;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }

    .add-event-btn:hover {
        background: #15803d;
    }
    </style>
    <style>
    .event-detail-btn {
        background: #16a34a;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
    }

    .event-detail-btn:hover {
        background: #15803d;
    }
    </style>
</head>
<body>

    <div class="header">
        Start 2 Finish
    </div>

    <div style="margin-bottom:20px;">
     <a href="new-event">
        <button class="add-event-btn">
            + New Event
        </button>
    </a>
    </div>

    <div class="container">

        <!-- Left Navigation -->
        <aside class="sidebar">
            <h3>Events</h3>

            <a href="#" class="active">All Events</a>
            <a href="#">Upcoming</a>
            <a href="#">Past</a>
            <a href="#">Categories</a>
            <a href="#">Subscriptions</a>
            <a href="index.html">← Back to Home</a>
        </aside>

        <!-- Content -->
        <main class="content">
            <h1>Events</h1>
            <br>

            <div class="product-grid">                
                <div class="product-card">
                    <h4>Event A</h4>
                    <p>Description for Event A</p>
                    <a href="product-details">
                        <button class="event-detail-btn">View Details</button>
                    </a>
                </div>
                <div class="product-card">
                    <h4>Event B</h4>
                    <p>Description for Event B</p>
                    <button>View Details</button>
                </div>

                <div class="product-card">
                    <h4>Event C</h4>
                    <p>Description for Event C</p>
                    <button>View Details</button>
                </div>

                <div class="product-card">
                    <h4>Event D</h4>
                    <p>Description for Event D</p>
                    <button>View Details</button>
                </div>

            </div>
        </main>

    </div>

</body>
</html>
