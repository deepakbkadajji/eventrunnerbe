<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Website Layout</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Pane */
        .navbar {
            background-color: #2563eb;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }

        .nav-links a:hover {
            text-decoration: underline;
        }

        /* Bottom Content Pane */
        .content {
            flex: 1;
            padding: 30px;
            background-color: #f5f7fa;
            overflow-y: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 800px;
        }

        h1 {
            margin-bottom: 15px;
        }

        p {
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
            }

            .nav-links {
                gap: 15px;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- Top Pane -->
    <header class="navbar">
        <div class="logo">Start 2 Finish</div>

        <nav class="nav-links">
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'login' %}">Login</a>
            <a href="{% url 'about' %}">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Bottom Pane -->
    <main class="content">
        <div class="card">
            <h1>Welcome</h1>
            <p>
                This is the content area. You can load data from your Django
                REST API here using JavaScript and display it dynamically.
            </p>

            <p>
                Example:
            </p>

            <pre>
GET /api/customers/
GET /api/orders/
GET /api/products/
            </pre>
        </div>
    </main>

</body>
</html>
